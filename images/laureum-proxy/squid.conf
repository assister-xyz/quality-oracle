# QO-059 squid allowlist for the L3 harness egress sidecar.
#
# Default-deny. Only the explicit allowlist below survives.
# AC2: api.anthropic.com:443 (claude-agent-sdk + Claude Code CLI).
# AC2 (judges-inline): api.cerebras.ai:443, api.groq.com:443.
# AC6: anything else CONNECTed-to is rejected with HTTP 403.

# ── Listen ──────────────────────────────────────────────────────────────────
http_port 3128

# Squid runs as the unprivileged `squid` user via Dockerfile's USER directive.
# No `cache_effective_user` needed in 6.x.

# ── Allowlist destination domains ──────────────────────────────────────────
acl anthropic_api dstdomain api.anthropic.com
acl cerebras_api  dstdomain api.cerebras.ai
acl groq_api      dstdomain api.groq.com

# Allowlist to SSL/CONNECT ports (HTTPS only — never HTTP).
acl SSL_ports port 443
acl CONNECT method CONNECT

# ── Rules ──────────────────────────────────────────────────────────────────
# Only allow CONNECT to allowlisted domains on port 443.
http_access allow CONNECT SSL_ports anthropic_api
http_access allow CONNECT SSL_ports cerebras_api
http_access allow CONNECT SSL_ports groq_api

# Deny all CONNECT to non-allowlisted destinations (AC6 — evil.com etc).
http_access deny CONNECT !SSL_ports
http_access deny !CONNECT
http_access deny all

# ── Hardening ──────────────────────────────────────────────────────────────
# Don't cache anything (eval reproducibility — every call is fresh).
cache deny all

# No DNS forwarding to external hostnames besides allowlist resolution.
dns_v4_first on

# Logging — keep failures visible so the activator can grep blocked attempts.
access_log stdio:/var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# Strip Via and X-Forwarded-For so the upstream API sees the request as if
# from the main container (this matters for IP-based rate limits at Anthropic).
via off
forwarded_for delete
